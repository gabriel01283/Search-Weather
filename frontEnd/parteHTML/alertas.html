<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Search Weather - Alertas</title>

    <link rel="stylesheet" href="/frontEnd/parteCSS/alertas.css">

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    >
</head>

<body>

    <nav class="navbar">
        <div>
            <h1>SEARCH WEATHER</h1>

            <ul>
                <li>
                    <a href="/frontEnd/parteHTML/index.html">
                        Home
                    </a>
                </li>
                
                <li>
                    <a href="/frontEnd/parteHTML/buscar.html">
                        Buscar
                    </a>
                </li>

                <li>
                    <a href="/frontEnd/parteHTML/favoritos.html">
                        Favoritos
                    </a>
                </li>

                <li>
                    <a href="/frontEnd/parteHTML/historico.html">
                        Histórico
                    </a>
                </li>
            
            </ul>

            <div class="user_area">
                <a
                    href="/frontEnd/parteHTML/login.html"
                    id="loginButton"
                    class="login_button"
                >
                    Login
                </a>

                <div
                    id="profileMenu"
                    class="profile_menu"
                >
                    <button
                        type="button"
                        id="profileButton"
                        class="profile_button"
                    >
                        <i class="fa-solid fa-user"></i>

                        <span id="userName">
                            Perfil
                        </span>

                        <i class="fa-solid fa-chevron-down"></i>
                    </button>

                    <div
                        id="profileDropdown"
                        class="profile_dropdown"
                    >
                        <a href="/frontEnd/parteHTML/perfil.html">
                            Meu perfil
                        </a>

                        <button
                            type="button"
                            id="logoutButton"
                        >
                            Sair
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <main class="main_content">
        <section class="alerts_container">

            <h2>Alertas</h2>

            <form
                id="alertForm"
                class="alert_form"
            >
                <input
                    type="number"
                    id="alertCityId"
                    placeholder="ID da cidade"
                    min="1"
                    required
                >

                <select
                    id="alertType"
                    required
                >
                    <option
                        value=""
                        selected
                        disabled
                    >
                        Tipo de alerta
                    </option>

                    <option value="Temperatura alta">
                        Temperatura alta
                    </option>

                    <option value="Temperatura baixa">
                        Temperatura baixa
                    </option>

                    <option value="Chuva">
                        Chuva
                    </option>

                    <option value="Tempestade">
                        Tempestade
                    </option>

                    <option value="Ventos fortes">
                        Ventos fortes
                    </option>
                </select>

                <input
                    type="number"
                    id="conditionValue"
                    placeholder="Valor da condição"
                    step="0.1"
                >

                <button type="submit">
                    Adicionar alerta
                </button>
            </form>

            <p id="alertMessage"></p>

            <div
                id="alertsList"
                class="alerts_list"
            >
                <p class="empty_message">
                    Seus alertas aparecerão aqui.
                </p>
            </div>

        </section>
    </main>

    <script src="/frontEnd/parteJS/auth.js"></script>
    <script src="/frontEnd/parteJS/alertas.js"></script>

</body>
</html>
