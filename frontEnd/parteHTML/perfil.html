<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Search Weather - Perfil</title>

    <link
        rel="stylesheet"
        href="/frontEnd/parteCSS/perfil.css"
    >

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    >

    <link
    rel="icon"
    type="image"
    href="/img/icons8-night-64.png"
    >
</head>

<body>

    <nav class="navbar">
        <div>
            <h1>SEARCH WEATHER</h1>

            <ul>
                <li>
                    <a href="/frontEnd/parteHTML/index.html">
                        Home
                    </a>
                </li>

                <li>
                    <a href="/frontEnd/parteHTML/buscar.html">
                        Buscar
                    </a>
                </li>

                <li>
                    <a href="/frontEnd/parteHTML/favoritos.html">
                        Favoritos
                    </a>
                </li>

                <li>
                    <a href="/frontEnd/parteHTML/historico.html">
                        Histórico
                    </a>
                </li>

                <li>
                    <a href="/frontEnd/parteHTML/alertas.html">
                        Alertas
                    </a>
                </li>
            </ul>

            <div class="user_area">
                <a
                    href="/frontEnd/parteHTML/login.html"
                    id="loginButton"
                    class="login_button"
                >
                    Login
                </a>

                <div
                    id="profileMenu"
                    class="profile_menu"
                >
                    <button
                        type="button"
                        id="profileButton"
                        class="profile_button"
                    >
                        <i class="fa-solid fa-user"></i>

                        <span id="userName">
                            Perfil
                        </span>

                        <i class="fa-solid fa-chevron-down"></i>
                    </button>

                    <div
                        id="profileDropdown"
                        class="profile_dropdown"
                    >
                        <a href="/frontEnd/parteHTML/perfil.html">
                            Meu perfil
                        </a>

                        <button
                            type="button"
                            id="logoutButton"
                        >
                            Sair
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <main class="main_content">
        <section class="profile_container">

            <div class="profile_header">
                <div class="profile_avatar">
                    <i class="fa-solid fa-user"></i>
                </div>

                <div>
                    <h2 id="profileName">
                        Carregando...
                    </h2>

                    <p>
                        Informações da sua conta
                    </p>
                </div>
            </div>

            <p id="profileMessage"></p>

            <div class="profile_card">

                <div class="profile_field">
                    <span>Nome</span>

                    <strong id="profileUsername">
                        --
                    </strong>
                </div>

                <div class="profile_field">
                    <span>E-mail</span>

                    <strong id="profileEmail">
                        --
                    </strong>
                </div>

                <div class="profile_field">
                    <span>Conta criada em</span>

                    <strong id="profileCreatedAt">
                        --
                    </strong>
                </div>

                <button
                    type="button"
                    id="profileLogoutButton"
                    class="profile_logout_button"
                >
                    <i class="fa-solid fa-right-from-bracket"></i>
                    Sair da conta
                </button>

            </div>

        </section>
    </main>

    <script src="/frontEnd/parteJS/auth.js"></script>
    <script src="/frontEnd/parteJS/perfil.js"></script>

</body>
</html>
